name: Security Orchestrator
# Single entry point — orchestrates all security scans committed by DSOMM Accelerator.
# Each sub-workflow is called via workflow_call.

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  sca:
    uses: ./.github/workflows/sca.yml
    secrets: inherit

  sast:
    uses: ./.github/workflows/sast.yml
    secrets: inherit

  secret_detection:
    uses: ./.github/workflows/secret-detection.yml
    secrets: inherit

  security_gate:
    uses: ./.github/workflows/security-gate.yml
    secrets: inherit

  iac_scan:
    uses: ./.github/workflows/iac-scan.yml
    secrets: inherit
