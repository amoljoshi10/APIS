name: Secrets Management Baseline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  detect-secrets:
    name: detect-secrets Baseline Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install detect-secrets
        run: pip install detect-secrets
      - name: Create or update baseline
        run: |
          if [ -f .secrets.baseline ]; then
            detect-secrets scan --baseline .secrets.baseline || true
          else
            detect-secrets scan > .secrets.baseline
            echo "Created .secrets.baseline — commit this file."
          fi
      - name: Audit baseline for unreviewed secrets
        run: detect-secrets audit .secrets.baseline --report || true
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-baseline
          path: .secrets.baseline
