name: Security Gate
on:
  workflow_call: {}
  workflow_dispatch: {}
permissions:
  contents: read
  security-events: read
jobs:
  security-gate:
    name: Security Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check security scan artifacts
        run: |
          echo "=== Security Gate: Checking scan results ==="
          FAIL=0

          # Check for any SARIF files uploaded as artifacts and fail on criticals
          for f in $(find . -name "*.sarif" 2>/dev/null | head -20); do
            CRITICALS=$(python3 -c "
          import json, sys
          try:
            d=json.load(open('$f'))
            count=sum(1 for r in d.get('runs',[{}])[0].get('results',[])
                      if r.get('level') in ('error','critical'))
            print(count)
          except:
            print(0)
          ")
            echo "  $f: $CRITICALS critical/error findings"
            if [ "$CRITICALS" -gt 0 ]; then FAIL=1; fi
          done

          if [ "$FAIL" -eq 1 ]; then
            echo "GATE FAILED: Critical security findings detected."
            exit 1
          fi
          echo "GATE PASSED: No critical findings."
