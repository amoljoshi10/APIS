name: Tests
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_call: {}
permissions:
  contents: read
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          if [ -f Makefile ] && grep -q '^test:' Makefile; then
            make test
          elif [ -f package.json ]; then
            npm ci && npm test
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt && python -m pytest || python -m unittest discover
          else
            echo "No standard test command found — add your test command here"
            exit 0
          fi
